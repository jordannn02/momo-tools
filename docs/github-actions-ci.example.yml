# The repository now ships a real workflow at:
# .github/workflows/ci.yml
#
# Keep this file only as a copy/paste reference for forks that want a different
# workflow name or branch policy.

name: ci

on:
  push:
  pull_request:

jobs:
  public-package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Make scripts executable
        run: chmod +x plugin/scripts/momo-tools scripts/install-local.sh scripts/build-release-snapshot.sh

      - name: Check Python and JSON syntax
        run: |
          python -m py_compile plugin/scripts/momo-tools
          python -m json.tool capabilities.schema.json >/dev/null
          python -m json.tool plugin/capabilities.example.json >/dev/null
          python -m json.tool tests/fixtures/route-cases.json >/dev/null
          python -m json.tool tests/fixtures/routing-benchmark.json >/dev/null
          test -f demo/index.html
          test -f demo/app.js
          test -f demo/styles.css

      - name: Private-context leak scan
        run: |
          set +e
          git grep -qE 'PRIVATE_[C]OMPANY|PRIVATE_[C]USTOMER|PRIVATE_[H]OST|PRIVATE_[D]ATABASE|PRIVATE_[S]ECRET_LABEL|/[U]sers/' -- .
          scan_rc=$?
          set -e
          case "$scan_rc" in
            0) exit 1 ;;
            1) ;;
            *) exit "$scan_rc" ;;
          esac

      - name: Run public unit tests
        run: python -m unittest discover -s tests -p 'test_*.py' -v

      - name: Validate public package
        run: |
          plugin/scripts/momo-tools validate
          plugin/scripts/momo-tools dashboard
          plugin/scripts/momo-tools audit
          plugin/scripts/momo-tools benchmark
          plugin/scripts/momo-tools evidence
          plugin/scripts/momo-tools freshness --as-of 2026-07-10T12:00:00+00:00 --strict
          plugin/scripts/momo-tools pressure
          plugin/scripts/momo-tools test

      - name: Validate YAML example
        run: plugin/scripts/momo-tools --index plugin/capabilities.example.yaml validate

      - name: Install smoke test and source trust comparison
        run: |
          tmp=$(mktemp -d)
          MOMO_TOOLS_HOME="$tmp" scripts/install-local.sh
          "$tmp/bin/momo-tools" test
          plugin/scripts/momo-tools integrity --installed-root "$tmp" --strict
          plugin/scripts/momo-tools recovery-drill --strict
          plugin/scripts/momo-tools slo --as-of 2026-07-10T12:00:00+00:00 --installed-root "$tmp" --strict

      - name: Build reproducible release snapshot
        run: |
          version=$(tr -d '\r\n' < VERSION)
          scripts/build-release-snapshot.sh --ref "$GITHUB_SHA" --output-dir dist/release-first
          scripts/build-release-snapshot.sh --ref "$GITHUB_SHA" --output-dir dist/release-second
          first_archive="dist/release-first/momo-tools-v${version}.tar.gz"
          second_archive="dist/release-second/momo-tools-v${version}.tar.gz"
          cmp "$first_archive" "$second_archive"
          cmp "${first_archive}.sha256" "${second_archive}.sha256"
          cmp "dist/release-first/momo-tools-v${version}.snapshot.json" "dist/release-second/momo-tools-v${version}.snapshot.json"
          mkdir -p dist/release
          cp dist/release-first/* dist/release/

      - name: Smoke-test release snapshot artifact
        run: |
          version=$(tr -d '\r\n' < VERSION)
          first_archive="dist/release-first/momo-tools-v${version}.tar.gz"
          snapshot_manifest="dist/release-first/momo-tools-v${version}.snapshot.json"
          (cd dist/release-first && sha256sum -c "momo-tools-v${version}.tar.gz.sha256")
          python - "$snapshot_manifest" "$GITHUB_SHA" <<'PY'
          import json
          import sys

          report = json.load(open(sys.argv[1], encoding="utf-8"))
          if report["commit_sha"] != sys.argv[2]:
              raise SystemExit("snapshot manifest commit does not match GITHUB_SHA")
          PY
          snapshot_extract=$(mktemp -d)
          installed_root=$(mktemp -d)
          trap 'rm -rf "$snapshot_extract" "$installed_root"' EXIT
          tar -xzf "$first_archive" -C "$snapshot_extract"
          snapshot_root="$snapshot_extract/momo-tools-v${version}"
          MOMO_TOOLS_HOME="$installed_root" "$snapshot_root/scripts/install-local.sh"
          "$installed_root/bin/momo-tools" test
          "$snapshot_root/plugin/scripts/momo-tools" integrity --installed-root "$installed_root" --strict
          "$snapshot_root/plugin/scripts/momo-tools" recovery-drill --strict
          "$snapshot_root/plugin/scripts/momo-tools" slo --as-of 2026-07-10T12:00:00+00:00 --installed-root "$installed_root" --strict

      - name: Upload release snapshot
        uses: actions/upload-artifact@v4
        with:
          name: momo-tools-release-snapshot-${{ github.sha }}
          path: dist/release/
          if-no-files-found: error
          retention-days: 14
