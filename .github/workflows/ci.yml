name: ci

on:
  push:
  pull_request:

jobs:
  public-package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Make scripts executable
        run: chmod +x plugin/scripts/momo-tools scripts/install-local.sh

      - name: Check Python and JSON syntax
        run: |
          python -m py_compile plugin/scripts/momo-tools
          python -m json.tool capabilities.schema.json >/dev/null
          python -m json.tool plugin/capabilities.example.json >/dev/null
          python -m json.tool tests/fixtures/route-cases.json >/dev/null
          python -m json.tool tests/fixtures/routing-benchmark.json >/dev/null
          test -f demo/index.html
          test -f demo/app.js
          test -f demo/styles.css

      - name: Validate public package
        run: |
          plugin/scripts/momo-tools validate
          plugin/scripts/momo-tools dashboard
          plugin/scripts/momo-tools audit
          plugin/scripts/momo-tools benchmark
          plugin/scripts/momo-tools evidence
          plugin/scripts/momo-tools pressure
          plugin/scripts/momo-tools test

      - name: Validate YAML example
        run: plugin/scripts/momo-tools --index plugin/capabilities.example.yaml validate

      - name: Install smoke test
        run: |
          MOMO_TOOLS_HOME=/tmp/momo-tools-public-install-test scripts/install-local.sh
          /tmp/momo-tools-public-install-test/bin/momo-tools test

      - name: Private-context leak scan
        run: |
          if grep -RInE --exclude='ci.yml' 'PRIVATE_COMPANY|PRIVATE_CUSTOMER|PRIVATE_HOST|PRIVATE_DATABASE|PRIVATE_SECRET_LABEL|/Users/' .; then
            exit 1
          fi
